<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 240">
  <defs>
    <clipPath id="outer"><rect width="180" height="240" rx="12"/></clipPath>
  </defs>
  <g clip-path="url(#outer)">
    <!-- Background -->
    <rect width="180" height="240" rx="12" fill="#fef2f2"/>
    <!-- Outer border -->
    <rect x="3" y="3" width="174" height="234" rx="10" fill="none" stroke="#e04040" stroke-width="7"/>
    <!-- Inner border -->
    <rect x="12" y="12" width="156" height="216" rx="6" fill="none" stroke="#e04040" stroke-width="2" opacity=".4"/>
    <!-- Skull -->
    <g transform="translate(68,22) scale(0.48)" fill="#e04040" opacity=".85">
      <!-- Cranium -->
      <ellipse cx="45" cy="38" rx="40" ry="36"/>
      <!-- Eyes -->
      <ellipse cx="30" cy="38" rx="10" ry="11" fill="#fef2f2"/>
      <ellipse cx="60" cy="38" rx="10" ry="11" fill="#fef2f2"/>
      <!-- Nose -->
      <path d="M40 52 L50 52 L45 60Z" fill="#fef2f2"/>
      <!-- Jaw -->
      <rect x="22" y="65" width="46" height="18" rx="4"/>
      <!-- Teeth -->
      <line x1="32" y1="65" x2="32" y2="83" stroke="#fef2f2" stroke-width="2.5"/>
      <line x1="40" y1="65" x2="40" y2="83" stroke="#fef2f2" stroke-width="2.5"/>
      <line x1="48" y1="65" x2="48" y2="83" stroke="#fef2f2" stroke-width="2.5"/>
      <line x1="56" y1="65" x2="56" y2="83" stroke="#fef2f2" stroke-width="2.5"/>
    </g>
    <!-- FASCIST vertical text -->
    <text x="28" y="148" font-family="'Playfair Display',Georgia,serif" font-size="21" font-weight="900" fill="#d03030" letter-spacing=".1em" text-anchor="middle" transform="rotate(-90 28 148)">FASCIST</text>
    <!-- ARTICLE -->
    <text x="108" y="115" font-family="'Playfair Display',Georgia,serif" font-size="12" font-weight="700" fill="#d03030" letter-spacing=".18em" text-anchor="middle" opacity=".7">ARTICLE</text>
    <!-- Barcode lines -->
    <g stroke="#d03030" opacity=".3" stroke-width="2.5">
      <line x1="70" y1="130" x2="146" y2="130"/>
      <line x1="74" y1="137" x2="142" y2="137"/>
      <line x1="78" y1="144" x2="138" y2="144"/>
      <line x1="70" y1="151" x2="146" y2="151"/>
      <line x1="76" y1="158" x2="140" y2="158"/>
      <line x1="82" y1="165" x2="134" y2="165"/>
      <line x1="72" y1="172" x2="144" y2="172"/>
      <line x1="78" y1="179" x2="138" y2="179"/>
      <line x1="74" y1="186" x2="142" y2="186"/>
      <line x1="80" y1="193" x2="136" y2="193"/>
      <line x1="70" y1="200" x2="146" y2="200"/>
      <line x1="76" y1="207" x2="140" y2="207"/>
    </g>
  </g>
</svg>