    <!-- ARTICLE -->
    <text x="108" y="115" font-family="'Playfair Display',Georgia,serif" font-size="12" font-weight="700" fill="#2aafbf" letter-spacing=".18em" text-anchor="middle" opacity=".7">ARTICLE</text>
    <!-- Barcode lines -->
