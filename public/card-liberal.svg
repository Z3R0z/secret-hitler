<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 240">
  <defs>
    <clipPath id="outer"><rect width="180" height="240" rx="12"/></clipPath>
  </defs>
  <g clip-path="url(#outer)">
    <!-- Background -->
    <rect width="180" height="240" rx="12" fill="#f0fbfd"/>
    <!-- Outer border -->
    <rect x="3" y="3" width="174" height="234" rx="10" fill="none" stroke="#3cc8dc" stroke-width="7"/>
