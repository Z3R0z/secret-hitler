      <line x1="70" y1="130" x2="146" y2="130"/>
      <line x1="74" y1="137" x2="142" y2="137"/>
      <line x1="78" y1="144" x2="138" y2="144"/>
      <line x1="70" y1="151" x2="146" y2="151"/>
      <line x1="76" y1="158" x2="140" y2="158"/>
      <line x1="82" y1="165" x2="134" y2="165"/>
      <line x1="72" y1="172" x2="144" y2="172"/>
      <line x1="78" y1="179" x2="138" y2="179"/>
      <line x1="74" y1="186" x2="142" y2="186"/>
      <line x1="80" y1="193" x2="136" y2="193"/>
      <line x1="70" y1="200" x2="146" y2="200"/>
      <line x1="76" y1="207" x2="140" y2="207"/>
